<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.container {
  position: relative;
  text-align: center;
  color: white;
}

.centered {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translate(-50%, -35%);
}
div.centered {
  font-size:3vw;
  background: rgb(0, 0, 0); /* Fallback color */
  background: rgba(0, 0, 0, 0.5); /* Black background with 0.5 opacity */
  color: white; /* white text */
  padding: 20px; /* Some padding */
}
.left_icon {
  position: absolute;
  top: 99%;
  left: 2%;
  transform: translate(-2%, -99%);
}
.right_icon {
  position: absolute;
  top: 99%;
  right: 2%;
  transform: translate(2%, -99%);
}
.center_icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgb(0, 0, 0); /* Fallback color */
  background: rgba(0, 0, 0, 0.5); /* Black background with 0.5 opacity */
  color: white; /* white text */
  padding: 10px; /* Some padding */
  font-size:.5vw;
  color: white;
}
@media screen and (max-width: 650px) {
  .left_icon {
    width: 40%;
  }
  .right_icon {
    width: 40%;
  }
  .center_icon{
    font-size:  .2 em;
  }
  .centered {
    font-size:  .2 em;
  }
}

html { overflow-y: hidden; }
</style>


</head>
<body>
<div class="container">
  <img src="ocean.jpg" alt="ocean" style="width:100%; height:80%;">
  <div class="centered">Bailey J. Anderson</div>
</div>
