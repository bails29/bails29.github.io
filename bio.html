<style>
.container {
  position: relative;
  text-align: center;
  color: white;
}

.centered {
  position: absolute;
  top: 47%;
  left: 50%;
  transform: translate(-50%, -47%);
}
div.centered {
  font-size: 40px;
}
.left_icon {
  position: absolute;
  top: 99%;
  left: 2%;
  transform: translate(-2%, -99%);
}
.right_icon {
  position: absolute;
  top: 99%;
  right: 2%;
  transform: translate(2%, -99%);
}
.center_icon {
  position: absolute;
  top: 99%;
  left: 50%;
  transform: translate(-50%, -99%);
}
div.center_icon{
  font-size: 20px;
  color: white;
}
.column1 {
  float: left;
  width: 25%;
  padding: 5px;
}
.column2 {

  width: 75%;
  padding: 5px;
}
.row::after {
  content: "";
  clear: both;
  display: table;
} 
html { overflow-y: visible; }
</style>
