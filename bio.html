<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.container {
  position: relative;
  text-align: center;
  color: white;
}

.centered {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, 50%);
}
div.centered {
  font-size: 40px;
}
.left_icon {
  position: absolute;
  top: 99%;
  left: 2%;
  transform: translate(-2%, -99%);
}
.right_icon {
  position: absolute;
  top: 99%;
  right: 2%;
  transform: translate(2%, -99%);
}
.center_icon {
  position: absolute;
  top: 99%;
  left: 50%;
  transform: translate(-50%, -99%);
}
div.center_icon{
  font-size: 20px;
  color: white;
}
.post-container{
    margin: 20px 20px 0 0;  
    border:5px solid #333;
}

.post-thumb img {
    float: left;
    clear:left;
    margin-right:8px;
}
.post-title{
    float:left;
}
.post-content {float:right;margin-right:8px;}
.clear{clear:both;}
html { overflow-y: visible; }
</style>

<header id="header-background">
    <div class="logo"></div>
  	<img src="gracie.jpg" alt="image" style="width:100%; height:80%;">
  	<div class="centered">Bio</div>
	</div>
    </div>
</header>


<body>
<div class="post-container">                
   <div class="post-thumb"><img src="B_Anderson_photo.jpg"/></div>
   <div class="post-title">Post title</div>
   <div class="post-content"><p>post description description description etc etc etc</p></div>
    <div class="clear"></div> 
</div>

</body>
</html>
